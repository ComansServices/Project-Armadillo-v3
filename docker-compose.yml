services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: armadillo
      POSTGRES_PASSWORD: armadillo
      POSTGRES_DB: armadillo
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: sh -lc "pnpm --filter @armadillo/api assets:enforce-identity && pnpm --filter @armadillo/api prisma:migrate:startup && pnpm --filter @armadillo/api dev"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: postgres://armadillo:armadillo@postgres:5432/armadillo
      AUTH_SESSION_SECRET: armadillo-dev-session-secret
      AUTH_ALLOW_LEGACY_HEADERS: "true"
      AUTH_FAIL_THRESHOLD: 5
      AUTH_LOCK_MINUTES: 15
    depends_on:
      - redis
      - postgres
    ports:
      - "4000:4000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: pnpm --filter @armadillo/worker dev
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WORKER_CONCURRENCY: 4
      DATABASE_URL: postgres://armadillo:armadillo@postgres:5432/armadillo
      ARMADILLO_AUTH_TOKEN: v1.eyJzdWIiOiJzZXJ2aWNlLXdlYiIsInJvbGUiOiJvd25lciIsIm9yZ0lkIjoiY29tYW5zIiwicHJvamVjdHMiOlsiKiJdLCJleHAiOjQxMDI0NDQ4MDAsImlhdCI6MTc3MjA5MDAwMCwic2lkIjoic3ZjLXdlYiJ9.5a54ab0c9c359e750e91b9648cfc33c805c6b859c8a3960f2931f0dd374f6601
    depends_on:
      - redis
      - postgres

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: pnpm --filter @armadillo/web dev --hostname 0.0.0.0 --port 3000
    environment:
      API_BASE_URL: http://api:4000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
      ARMADILLO_AUTH_TOKEN: v1.eyJzdWIiOiJzZXJ2aWNlLXdlYiIsInJvbGUiOiJvd25lciIsIm9yZ0lkIjoiY29tYW5zIiwicHJvamVjdHMiOlsiKiJdLCJleHAiOjQxMDI0NDQ4MDAsImlhdCI6MTc3MjA5MDAwMCwic2lkIjoic3ZjLXdlYiJ9.5a54ab0c9c359e750e91b9648cfc33c805c6b859c8a3960f2931f0dd374f6601
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  pg_data:
